# =============================================================================
#  nginx site config — Piotr Latyński portfolio (static Vue/Vite SPA)
#  Target: OVHcloud VPS, Ubuntu 24.04, nginx
#
#  This file is HTTP-only (port 80) on purpose. Run certbot AFTER installing it:
#      sudo certbot --nginx -d imaginative-input.pl -d www.imaginative-input.pl
#  certbot rewrites this block to listen on 443 with TLS and adds an
#  HTTP->HTTPS redirect automatically. See DEPLOY.md.
#
#  Domain is set to imaginative-input.pl; web root is /var/www/imaginative-input.pl
#  (keep that in sync with the DEPLOY_PATH GitHub secret).
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    server_name imaginative-input.pl www.imaginative-input.pl;

    # rsync from CI drops the built site here (see DEPLOY.md / DEPLOY_PATH secret)
    root /var/www/imaginative-input.pl;
    index index.html;

    # ---- SPA fallback -------------------------------------------------------
    # Anchor-nav site today; this also future-proofs vue-router history mode.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Caching ------------------------------------------------------------
    # Vite fingerprints everything under /assets/ -> safe to cache forever.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Non-fingerprinted root static (favicon, profile-pic) -> moderate cache.
    location ~* \.(?:css|js|mjs|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|ico|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # The entry point must always revalidate so deploys go live immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # ---- Compression --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    # ---- Security headers ---------------------------------------------------
    # `always` so they apply to error responses too.
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;

    # CSP tuned for this site: self-hosted JS/CSS + Google Fonts.
    # Vite injects <style> tags at runtime -> style-src needs 'unsafe-inline'.
    # If you add 3rd-party scripts/analytics later, widen script-src.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'" always;

    # ---- Hardening ----------------------------------------------------------
    # Block dotfiles (e.g. leaked .git, .env) but allow ACME challenges.
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Custom 404 -> SPA shell (keeps the app in control of unknown paths).
    error_page 404 /index.html;

    # ---- AFTER certbot runs -------------------------------------------------
    # Once HTTPS works, enable HSTS by adding this line inside the 443 block
    # certbot creates (do NOT enable before TLS is confirmed working):
    #   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
}
