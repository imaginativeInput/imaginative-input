name: Deploy to VPS

# Build the static site in CI, then rsync dist/ to the OVHcloud VPS over SSH.
# The VPS only runs nginx — no Node/npm in production.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Never let two deploys race onto the server at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy with rsync over SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DEPLOY_SSH_KEY  the PRIVATE key (contents of ~/.ssh/portfolio_deploy, incl.
#                   the BEGIN/END lines) whose public half is in the deploy
#                   user's ~/.ssh/authorized_keys on the VPS
#   SSH_HOST        server IP or domain (e.g. 146.59.32.243)
#   SSH_USER        deploy user (e.g. "deploy")
#   DEPLOY_PATH     web root, e.g. "/var/www/imaginative-input.pl"
#   SSH_PORT        (optional) SSH port; defaults to 22
#
# Actions are pinned to commit SHAs (trailing comment shows the version).
# To bump one: gh api repos/<owner>/<repo>/commits/<new-tag> --jq .sha
